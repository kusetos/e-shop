apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-service
  namespace: e-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basket-service
  template:
    metadata:
      labels:
        app: basket-service
    spec:
      containers:
        - name: basket-service
          image: e-shop-basket-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: e-shop-config
            - secretRef:
                name: e-shop-secret

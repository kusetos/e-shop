apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: e-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: e-shop-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: e-shop-config
            - secretRef:
                name: e-shop-secret

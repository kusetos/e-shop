apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: e-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: e-shop-identity-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: e-shop-config
            - secretRef:
                name: e-shop-secret

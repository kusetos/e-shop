apiVersion: v1
kind: Secret
metadata:
  name: e-shop-secret
  namespace: e-shop
stringData:
  POSTGRES_PASSWORD:       "eshop"
  REDIS_PASSWORD:          "secret"
  JWT_SECRET:              "change-this-in-production"
  CATALOG_DATABASE_URL:    "postgres://eshop:eshop@postgres:5432/catalog"
  ORDERING_DATABASE_URL:   "postgres://eshop:eshop@postgres:5432/ordering"
  IDENTITY_DATABASE_URL:   "postgres://eshop:eshop@postgres:5432/identity"
  REDIS_URL:               "redis://:secret@redis:6379"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: eshop
      POSTGRES_PASSWORD: eshop
      POSTGRES_DB: catalog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eshop -d catalog"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass secret --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - cache_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret", "ping"]
      interval: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: bins/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:3000
      BASKET_SERVICE_URL: http://basket-service:3001
      ORDERING_SERVICE_URL: http://ordering-service:3002
      IDENTITY_SERVICE_URL: http://identity-service:3003
      JWT_SECRET: change-this-in-production
    depends_on:
      - catalog-service
      - basket-service
      - ordering-service
      - identity-service

  catalog-service:
    build:
      context: .
      dockerfile: bins/catalog-service/Dockerfile
    ports:
      - "3000:3000"
    environment:
      CATALOG_DATABASE_URL: postgres://eshop:eshop@postgres:5432/catalog
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  basket-service:
    build:
      context: .
      dockerfile: bins/basket-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: redis://:secret@redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  identity-service:
    build:
      context: .
      dockerfile: bins/identity-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      IDENTITY_DATABASE_URL: postgres://eshop:eshop@postgres:5432/identity
      JWT_SECRET: change-this-in-production
    depends_on:
      postgres:
        condition: service_healthy

  ordering-service:
    build:
      context: .
      dockerfile: bins/ordering-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      ORDERING_DATABASE_URL: postgres://eshop:eshop@postgres:5432/ordering
      CATALOG_SERVICE_URL: http://catalog-service:3000
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  cache_data:
    driver: local
